services:
  ghost:
    image: ghost:5
    container_name: ghost
    restart: unless-stopped
    ports:
      - "80:2368"
    environment:
      url: ${GHOST_URL}
      NODE_ENV: production
      database__client: sqlite3
      database__connection__filename: /var/lib/ghost/content/data/ghost.db
    volumes:
      - ghost_content:/var/lib/ghost/content

volumes:
  ghost_content:
